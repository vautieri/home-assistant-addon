name: Build Patched Music Assistant

on:
  push:
    branches: [main]
    paths:
      - 'music_assistant_patched/**'
  workflow_dispatch:
    inputs:
      base_version:
        description: 'Base MA version to patch'
        required: true
        default: '2.8.1'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vautieri/music-assistant-patched

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (amd64)
        uses: docker/build-push-action@v5
        with:
          context: music_assistant_patched
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.base_version || '2.8.1' }}
          build-args: |
            BASE_VERSION=${{ github.event.inputs.base_version || '2.8.1' }}

      - name: Build and push (aarch64)
        uses: docker/build-push-action@v5
        with:
          context: music_assistant_patched
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-aarch64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.base_version || '2.8.1' }}-aarch64
          build-args: |
            BASE_VERSION=${{ github.event.inputs.base_version || '2.8.1' }}
